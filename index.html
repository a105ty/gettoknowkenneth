<style type="text/css" media="all">
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --espresso: #1E0F05;
    --dark-brown: #2C1A0E;
    --med-brown: #4A2C17;
    --warm-brown: #7B4A2D;
    --gold: #C8903C;
    --light-gold: #E8B86D;
    --cream: #F5E6D0;
    --light-cream: #FAF3E8;
    --olive: #4D5E35;
    --light-olive: #6B7F4A;
    --fog: #D6C9B8;
    --white: #FFFDF9;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light-cream);
    color: var(--dark-brown);
    overflow-x: hidden;
  }

  /* Grain */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: linear-gradient(to bottom, rgba(30,15,5,0.95), rgba(30,15,5,0.85));
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(200,144,60,0.2);
    height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-text { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .nav-logo-sub { font-family: 'DM Sans', sans-serif; color: var(--gold); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 2px; }
  .nav-links { display: flex; gap: 6px; }
  .nav-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 10px; padding: 6px 18px; cursor: pointer;
    transition: all 0.3s; text-align: center;
  }
  .nav-btn:hover, .nav-btn.active {
    background: rgba(200,144,60,0.12);
    border-color: rgba(200,144,60,0.5);
  }
  .nav-btn-id { font-family: 'Playfair Display', serif; color: var(--fog); font-size: 13px; display: block; transition: color 0.3s; }
  .nav-btn.active .nav-btn-id { color: var(--gold); }
  .nav-btn-en { font-family: 'DM Sans', sans-serif; color: rgba(214,201,184,0.5); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; display: block; transition: color 0.3s; }
  .nav-btn.active .nav-btn-en { color: var(--light-gold); }
nav {
  display: flex;
  align-items: center; /* Supaya semua rata tengah secara vertikal */
  justify-content: space-between; /* Lempar brand ke kiri, tombol ke kanan */
  padding: 10px 20px;
}

/* Mengatur Logo dan Tulisan agar berjejer ke samping */
.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px; /* Jarak antara logo dan tulisan */
}

/* Mengatur barisan teks agar menumpuk ke bawah (Title & Subtitle) */
.nav-text-group {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

/* Reset margin default h1 dan h5 agar tidak berantakan */
#nav_logo_text, #nav_logo_sub {
  margin: 0;
  padding: 0;
}

#nav_logo_text {
  font-size: 1.2rem;
}

#nav_logo_sub {
  font-size: 0.8rem;
  font-weight: normal;
}
  /* PAGES */
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* HERO */
  .hero {
    padding: 140px 60px 80px;
    position: relative; overflow: hidden;
  }
  .hero-label {
    font-family: 'DM Sans', sans-serif; color: var(--light-gold);
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .hero-label::before { content: ''; display: block; width: 40px; height: 1px; background: var(--light-gold); }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 5vw, 58px); font-weight: 400; line-height: 1.22;
    margin-bottom: 24px; color: var(--cream);
  }
  .hero h1 span { color: var(--light-gold); font-weight: 700; font-style: normal; }
  .hero p { font-family: 'DM Sans', sans-serif; color: var(--fog); font-size: 15px; line-height: 1.75; max-width: 520px; }
  .hero-deco-circle {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(200,144,60,0.12);
    pointer-events: none;
  }

  /* SECTION WRAPPER */
  .section { padding: 60px 60px 80px; max-width: 1140px; margin: 0 auto; }
  .section-title { display: flex; align-items: baseline; gap: 14px; margin-bottom: 32px; }
  .section-title h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--dark-brown); }
  .section-title span { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--warm-brown); letter-spacing: 0.18em; text-transform: uppercase; }

  /* GALLERY GRID */
  .gallery { display: grid; grid-template-columns: repeat(6,1fr); grid-template-rows: 280px; gap: 10px; margin-bottom: 20px; }
  .gallery-item {
    border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.3s; overflow: hidden; position: relative;
  }
  .gallery-item:hover { transform: scale(1.025); box-shadow: 0 18px 44px rgba(30,15,5,0.45); }
  .gallery-item:hover .gallery-border { opacity: 1; }
  .gallery-border { position: absolute; inset: 0; border: 2px solid rgba(200,144,60,0.55); border-radius: 14px; opacity: 0; transition: opacity 0.3s; }
  .gallery-emoji { font-size: 44px; margin-bottom: 8px; transition: font-size 0.3s; }
  .gallery-item:hover .gallery-emoji { font-size: 52px; }
  .gallery-label { font-family: 'DM Sans', sans-serif; color: var(--cream); font-size: 11px; letter-spacing: 0.08em; text-align: center; padding: 0 10px; opacity: 0.75; transition: opacity 0.3s; }
  .gallery-item:hover .gallery-label { opacity: 1; }

  /* EXPERIENCE CARDS */
  .exp-card {
    background: var(--white); border-radius: 20px;
    border: 1px solid rgba(214,201,184,0.5);
    overflow: hidden; display: grid; grid-template-columns: 5px 1fr;
    margin-bottom: 20px; box-shadow: 0 4px 20px rgba(30,15,5,0.06);
  }
  .exp-stripe { border-radius: 20px 0 0 20px; }
  .exp-body { padding: 28px 34px; }
  .exp-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .exp-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .exp-cafe { font-family: 'Playfair Display', serif; font-size: 21px; color: var(--dark-brown); font-weight: 700; }
  .exp-badge { border-radius: 100px; padding: 3px 13px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; }
  .exp-location { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--warm-brown); }
  .exp-period { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--fog); font-style: italic; }
  .exp-desc { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--med-brown); line-height: 1.7; margin-bottom: 18px; }
  .exp-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .exp-chip { background: var(--light-cream); border: 1px solid var(--fog); border-radius: 8px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--dark-brown); }

  /* CTA */
  .cta-wrap { text-align: center; margin-top: 48px; }
  .cta-btn {
    background: linear-gradient(135deg, var(--gold), var(--light-gold));
    border: none; border-radius: 100px; padding: 16px 50px;
    font-family: 'Playfair Display', serif; font-size: 16px;
    color: var(--espresso); font-weight: 700; cursor: pointer;
    box-shadow: 0 10px 36px rgba(200,144,60,0.38);
    letter-spacing: 0.05em; transition: all 0.3s;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 44px rgba(200,144,60,0.5); }

  /* SOCIAL MEDIA */
  .social-bar {
    display: flex; gap: 14px; align-items: center;
    justify-content: center; margin-top: 36px; flex-wrap: wrap;
  }
  .social-btn {
    display: inline-flex; align-items: center; gap: 8px;
    text-decoration: none; border-radius: 100px;
    padding: 10px 22px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; transition: all 0.3s;
    border: 1.5px solid;
  }
  .social-btn:hover { transform: translateY(-2px); }
  .social-instagram { background: rgba(200,144,60,0.1); border-color: rgba(200,144,60,0.5); color: var(--light-gold); }
  .social-instagram:hover { background: rgba(200,144,60,0.2); }
  .social-tiktok { background: rgba(255,255,255,0.05); border-color: rgba(214,201,184,0.4); color: var(--fog); }
  .social-tiktok:hover { background: rgba(255,255,255,0.1); }
  .social-linkedin { background: rgba(77,94,53,0.15); border-color: rgba(107,127,74,0.5); color: var(--light-olive); }
  .social-linkedin:hover { background: rgba(77,94,53,0.25); }
  .social-lynk { background: rgba(200,144,60,0.15); border-color: rgba(200,144,60,0.6); color: var(--gold); }
  .social-lynk:hover { background: rgba(200,144,60,0.25); }

  /* ── CERTIFICATIONS ── */
  .cert-stats { display: flex; gap: 44px; margin-top: 40px; }
  .cert-stat-num { font-family: 'Playfair Display', serif; color: var(--light-gold); font-size: 38px; font-weight: 700; line-height: 1; }
  .cert-stat-label { font-family: 'DM Sans', sans-serif; color: var(--fog); font-size: 12px; letter-spacing: 0.1em; margin-top: 4px; }

  .cert-category { margin-bottom: 44px; }
  .cert-cat-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .cert-cat-icon {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .cert-cat-name { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark-brown); font-weight: 700; }
  .cert-cat-line { width: 60px; height: 2px; border-radius: 2px; margin-top: 5px; }
  .cert-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }

  .cert-card {
    background: var(--white); border-radius: 20px;
    border: 1.5px solid rgba(214,201,184,0.5);
    overflow: hidden; cursor: pointer;
    box-shadow: 0 3px 16px rgba(30,15,5,0.06);
    transition: all 0.3s;
  }
  .cert-card:hover { box-shadow: 0 12px 36px rgba(30,15,5,0.1); transform: translateY(-2px); }
  .cert-card-top { padding: 20px 24px 16px; }
  .cert-org { font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  .cert-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--dark-brown); font-weight: 700; line-height: 1.4; }
  .cert-card-body { padding: 14px 24px 20px; }
  .cert-grade-badge {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 100px; padding: 3px 12px; margin-bottom: 10px;
  }
  .cert-grade-dot { width: 6px; height: 6px; border-radius: 50%; }
  .cert-grade-text { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; }
  .cert-year { font-family: 'DM Sans', sans-serif; font-size: 10px; background: rgba(214,201,184); padding: 2px 8px; border-radius: 100px; ; }
  .cert-desc {
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--med-brown); line-height: 1.65;
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
  }
  .cert-desc.open { max-height: 120px; }
  .cert-toggle { font-family: 'DM Sans', sans-serif; font-size: 11px; opacity: 0.65; margin-top: 6px; }

 .cert-desc, .cert-img-preview {
    display: none;
    margin-top: 10px;
}

/* Class saat kartu aktif (setelah diklik) */
.cert-card.active .cert-desc, 
.cert-card.active .cert-img-preview {
    display: block;
}

.cert-img-preview {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 6px;
    cursor: zoom-in;
    margin-top: 12px;
}

/* Style Modal Zoom */
.modal-overlay {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    align-items: center;
    justify-content: center;
}

.modal-content {
    max-width: 90%;
    max-height: 80%;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.close-modal {
    position: absolute;
    top: 20px; right: 30px;
    color: white;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
}
  /* FOOTER */
  footer {
    background: var(--espresso);
    border-top: 1px solid rgba(200,144,60,0.18);
    padding: 36px 60px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
  }
  footer .f-name { font-family: 'Playfair Display', serif; color: var(--fog); font-size: 14px; font-style: italic; }
  footer .f-copy { font-family: 'DM Sans', sans-serif; color: rgba(214,201,184,0.5); font-size: 11px; letter-spacing: 0.1em; }

  /* STEAM ANIMATION */
  .steam-wrap { position: absolute; top: 80px; right: 120px; color: var(--cream); opacity: 0.5; pointer-events: none; }
  @keyframes s1 { 0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-9px) scaleX(1.3)} }
  @keyframes s2 { 0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-11px) scaleX(0.8)} }
  @keyframes s3 { 0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-7px) scaleX(1.2)} }
  .sp1{animation:s1 2.5s ease-in-out infinite; transform-origin: center;}
  .sp2{animation:s2 2.8s ease-in-out infinite 0.4s; transform-origin: center;}
  .sp3{animation:s3 2.3s ease-in-out infinite 0.8s; transform-origin: center;}

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links { gap: 2px; }
    .nav-btn { padding: 4px 10px; }
    .hero { padding: 110px 24px 60px; }
    .section { padding: 40px 24px 60px; }
    .gallery { grid-template-columns: repeat(3,1fr); grid-template-rows: 180px 180px; }
    footer { flex-direction: column; text-align: center; padding: 28px 24px; }
    .cert-stats { gap: 24px; }
    .sensory-box { flex-direction: column; padding: 28px 24px; }
  }

</style>

<script>
  // ── Page Navigation ──
  function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (id === 'skills') setTimeout(animateBars, 300);
  }

  
  // ── Coffee Bean SVG helper ──
  function beanSVG(filled) {
    const c = filled ? '#C8903C' : '#D6C9B8';
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <ellipse cx="12" cy="12" rx="8" ry="11" stroke="${c}" stroke-width="1.5" fill="${filled ? c+'30' : 'none'}"/>
      <path d="M12 1 Q16 6 16 12 Q16 18 12 23" stroke="${c}" stroke-width="1.2" fill="none"/>
      <path d="M12 1 Q8 6 8 12 Q8 18 12 23" stroke="${c}" stroke-width="1.2" fill="none"/>
    </svg>`;
  }

  // ── Render beans ──
  const beanValues = [5, 5, 4, 4, 3, 4];
  beanValues.forEach((v, i) => {
    const el = document.getElementById('beans-' + i);
    if (el) {
      let html = '';
      for (let j = 0; j < 5; j++) html += beanSVG(j < v);
      el.innerHTML = html;
      el.style.display = 'flex';
      el.style.gap = '4px';
    }
  });

  // ── Init ──
  window.addEventListener('load', () => {
    // Trigger bars if skills page is first (not default, just in case)
    if (document.getElementById('page-skills').classList.contains('active')) animateBars();
  });
  
</script>

}

// 1. Fungsi Toggle Detail
function toggleCert(card) {
  // Tutup kartu lain yang sedang terbuka (Opsional)
  // document.querySelectorAll('.cert-card').forEach(c => { if(c !== card) c.classList.remove('active') });
  
  card.classList.toggle('active');
  const toggleText = card.querySelector('.toggle-text');
  
  if (card.classList.contains('active')) {
    toggleText.innerText = "▲ Tutup detail";
  } else {
    toggleText.innerText = "▼ Lihat detail";
  }
}

// 2. Fungsi Zoom Gambar
function openImage(event, src) {
  event.stopPropagation(); // Agar fungsi toggleCert tidak ikut jalan saat gambar diklik
  const modal = document.getElementById("certModal");
  const modalImg = document.getElementById("imgFull");
  modal.style.display = "flex";
  modalImg.src = src;
}

// 3. Fungsi Tutup Modal
function closeImage() {
